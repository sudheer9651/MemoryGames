<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Memory Trainer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#appContent">Skip to content</a>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Memory Trainer</p>
        <h1>Number Memory Trainer</h1>
      </div>
      <button id="darkModeToggle" class="toggle-button" type="button">
        Dark Mode
      </button>
    </header>

    <main id="appContent" class="app-content" role="main" aria-label="Number Memory Trainer app"></main>
    <div id="announcer" class="sr-only" aria-live="polite" aria-atomic="true"></div>

    <footer class="app-footer">
      <p>Practice number recall with responsive training, saved settings, and persistent progress.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
